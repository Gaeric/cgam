<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>soft body simulation</title>
        <style>
         body {
             font-family: vendana;
             font-size: 15px;
         }
         .button {
             background-color: #606060;
             border: none;
             color: white;
             padding: 10px 32px;
             font-size: 16px;
             margin: 4px 2px;
             cursor: pointer;
         }
        </style>
    </head>
    <body>

        <h1>soft body simulation</h1>
        <button id="buttonRun">Run</button>
        <button id="squash">Squash</button>
        <input id="showTets" name="" type="text" value=""/> <p>Show tets</p>

        <span id="numTets">0</span> tets&nbsp;&nbsp;
        <span id="numTris">0</span> tris&nbsp;&nbsp;
        <span id="numVerts">0</span> verts&nbsp;&nbsp;
        Compliance:
        <input name="" type="text" value="0" min="0" max="10" id="complianceSlider"/>
        <br/><br/>

        <div id="container"></div>

        <script src="https://unpkg.com/three@0.139.2/build/three.min.js"></script>
        <script src="https://unpkg.com/three@0.139.2/examples/js/controls/OrbitControls.js"></script>

        <script type="module" src="./12-soft_body_skinning.js"></script>
        
    </body>
</html>
